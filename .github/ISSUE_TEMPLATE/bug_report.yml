name: Bug Report
description: Report a bug in react-native-view-recorder
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below so we can investigate.

  - type: input
    id: library-version
    attributes:
      label: react-native-view-recorder version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: rn-version
    attributes:
      label: React Native version
      placeholder: "0.83.2"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Both
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - New Architecture (Fabric + TurboModules)
        - Old Architecture (Paper + Bridge)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce the issue. A link to a reproduction repo is ideal.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error messages
      render: shell
