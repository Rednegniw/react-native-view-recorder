// android/build.gradle
buildscript {
    ext.kotlin_version = '1.9.24'
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.4.2")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version")
    }
}

apply plugin: 'com.android.library'
apply plugin: 'org.jetbrains.kotlin.android'

def isNewArchitectureEnabled() {
    return rootProject.hasProperty("newArchEnabled") && rootProject.getProperty("newArchEnabled") == "true"
}

// Apply React Native codegen plugin
apply plugin: "com.facebook.react"

// Resolve react-native directory for codegen
def resolveReactNativeDirectory() {
    def reactNativeLocation = safeExtGet("REACT_NATIVE_NODE_MODULES_DIR", null)
    if (reactNativeLocation != null) {
        return file(reactNativeLocation)
    }

    // Use node to resolve react-native location
    def reactNativePackage = file(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim())
    return reactNativePackage.parentFile
}

def safeExtGet(prop, fallback) {
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

react {
    libraryName = "RNVideoEncoderSpec"
    codegenJavaPackageName = "com.reactnativevideoencoder"
    jsRootDir = file("../src")
}

def IS_NEW_ARCHITECTURE_ENABLED = isNewArchitectureEnabled()

android {
    compileSdk = safeExtGet('compileSdkVersion', 34)

    buildFeatures {
        buildConfig = true
    }

    defaultConfig {
        minSdk = safeExtGet('minSdkVersion', 21)
        targetSdk = safeExtGet('targetSdkVersion', 34)

        versionCode 1
        versionName "1.0.0"

        consumerProguardFiles 'proguard-rules.pro'

        buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", IS_NEW_ARCHITECTURE_ENABLED.toString()
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
    namespace 'com.reactnativevideoencoder'

    sourceSets {
        main {
            java.srcDirs += 'src/main/java'
        }
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation 'com.facebook.react:react-android'
}
