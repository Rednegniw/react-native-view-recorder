pre-commit:
  parallel: true
  jobs:
    - name: biome check
      glob: "*.{js,ts,jsx,tsx,mjs,cjs,json,css}"
      run: bunx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
    - name: typecheck
      glob: "*.{ts,tsx}"
      run: bun run lib check-types
    - name: clang-format
      glob: "*.{m,mm,h,cpp}"
      run: clang-format -i {staged_files}
      stage_fixed: true
    - name: swiftlint
      glob: "*.swift"
      run: swiftlint lint --strict --config .swiftlint.yml {staged_files}
